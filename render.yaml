services:
  # ----------------------------------------------------
  # 🐍 FastAPI Backend Web Service
  # ----------------------------------------------------
  - type: web
    name: contextiq-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0
    disk:
      name: uploads-cache
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 1

  # ----------------------------------------------------
  # ⚛️ Next.js Frontend Web Service
  # ----------------------------------------------------
  - type: web
    name: contextiq-frontend
    env: node
    rootDir: frontend
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NODE_VERSION
        value: 20.0.0
